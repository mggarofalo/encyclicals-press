name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Bridge until the actions/* and astral-sh/setup-uv references all
  # publish Node-24 builds. Node-20 is removed from runners 2026-09-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Test
        run: uv run pytest

      - name: Ingest committed fixtures into corpus
        # corpus/ is gitignored (derived from input/). CI has no input/
        # either, so seed corpus/ from the lorem-ipsum'd HTML under
        # tests/fixtures/ — the ingest fallback path.
        run: |
          for fixture in tests/fixtures/*.html; do
            slug="$(basename "$fixture" .html)"
            uv run encyclicals ingest "$slug"
          done

      - name: Render all encyclicals
        run: uv run encyclicals build --all

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: encyclicals-pdf
          path: output/*.pdf
          if-no-files-found: error
